<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiritual Growth Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Custom scrollbar adjustments for a clean layout */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        
        /* 🖨️ HIGH-FIDELITY PRINT & PDF LAYOUT STYLES */
        @media print {
            .print\:hidden, 
            button, 
            footer, 
            select,
            #sermon-drawer,
            #sermon-drawer-backdrop,
            .action-btn,
            input[type="checkbox"]::after {
                display: none !important;
            }
            
            .max-w-xl {
                max-width: 100% !important;
                width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
            }

            .bg-white {
                page-break-inside: avoid;
                break-inside: avoid;
                border: 1px solid #e2e8f0 !important;
                box-shadow: none !important;
                margin-bottom: 1.5rem;
            }

            body {
                background: white !important;
                color: black !important;
                font-size: 14px;
            }
            
            /* Keep checked state visuals clean in printed layouts */
            input[type="checkbox"] {
                border: 1px solid #000 !important;
                background-color: transparent !important;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen pb-12">

    <div class="max-w-xl mx-auto px-4 pt-6">
        
        <div class="w-full text-center mb-4">
            <span id="live-banner-date" class="inline-block bg-emerald-100 text-emerald-800 font-bold text-xs uppercase tracking-wider px-3 py-1 rounded-full">
                </span>
        </div>

        <header class="flex items-center justify-between border-b border-slate-200 pb-4 mb-6">
            <div>
                <h1 class="text-2xl font-black text-slate-900 tracking-tight">Spiritual Growth Hub</h1>
                <p class="text-xs text-slate-500 font-medium">Your Guide to Spiritual Growth</p>
            </div>
            
            <div class="flex items-center gap-2">
                <button onclick="window.print()" class="flex items-center gap-1 text-xs font-bold text-emerald-700 bg-emerald-50 hover:bg-emerald-100 px-3 py-1.5 rounded-lg transition print:hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3.5 h-3.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6.72 13.829c-.24.03-.48.062-.72.096m.72-.096a42.415 42.415 0 0 1 10.56 0m-10.56 0L6.34 18m10.94-4.171c.24.03.48.062.72.096m-.72-.096L17.66 18m0 0 .229 1.252c.11.604-.336 1.148-.951 1.148H7.062c-.615 0-1.06-.544-.951-1.148L6.34 18m11.32 0h-11.32M18 10.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0ZM6 6h12v4.5H6V6Z" />
                    </svg>
                    Export PDF
                </button>
                
                <button onclick="resetAppData()" class="text-[10px] font-bold text-red-700 bg-red-50 hover:bg-red-100 px-2 py-1 rounded transition print:hidden">
                    ⚠️ Reset App Data
                </button>
            </div>
        </header>

        <main class="space-y-6">
            
            <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-sm font-bold text-slate-900 uppercase tracking-wider">7-Day Habits Consistency</h2>
                    <span class="text-xs bg-slate-100 text-slate-600 font-bold px-2 py-0.5 rounded-full">Weekly Routine</span>
                </div>
                <div id="habit-tracker-container" class="grid grid-cols-7 gap-2">
                    </div>
            </section>

            <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <div class="mb-4">
                    <h2 class="text-sm font-bold text-slate-900 uppercase tracking-wider">Theme: Discipleship Cost</h2>
                    <div class="mt-2 flex items-center gap-2 print:hidden">
                        <label for="week-selector" class="text-xs text-slate-500 font-semibold">WEEK:</label>
                        <select id="week-selector" onchange="handleWeekChange()" class="w-full text-xs bg-slate-50 border border-slate-200 rounded-lg px-2 py-1.5 font-medium text-slate-700 outline-none focus:border-slate-300">
                            </select>
                    </div>
                </div>
                <div id="thematic-matrix-list" class="space-y-2">
                    </div>
            </section>

            <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="text-sm font-bold text-slate-900 uppercase tracking-wider">Relational Prayer Engine</h2>
                </div>
                <div id="relational-care-list" class="space-y-3">
                    </div>
            </section>

            <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <h2 class="text-sm font-bold text-slate-900 uppercase tracking-wider mb-3">Sermon & Journal Vault</h2>
                <div id="notes-archive-target" class="space-y-2">
                    </div>
            </section>

        </main>
        
        <div class="mt-6 print:hidden">
            <button onclick="toggleSermonDrawer()" class="w-full bg-emerald-950 text-white font-bold py-3 px-4 rounded-xl shadow-md hover:bg-emerald-900 transition flex items-center justify-center gap-2 text-sm tracking-wide">
                ✍️ Open Sermon Reflection Journal Drawer
            </button>
        </div>

    </div>

    <div id="sermon-drawer-backdrop" onclick="toggleSermonDrawer()" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-300 print:hidden"></div>
    <div id="sermon-drawer" class="fixed bottom-0 left-0 right-0 max-w-xl mx-auto bg-white rounded-t-3xl shadow-xl z-50 transform translate-y-full transition-transform duration-300 ease-out border-t border-slate-200 print:hidden max-h-[85vh] overflow-y-auto">
        <div class="p-6">
            <div class="flex items-center justify-between border-b border-slate-100 pb-3 mb-4">
                <h3 class="text-md font-bold text-slate-900">Sermon Journal Input Pad</h3>
                <button onclick="toggleSermonDrawer()" class="text-xs text-emerald-700 bg-emerald-50 hover:bg-emerald-100 font-bold px-3 py-1 rounded-md">
                    Minimize ✕
                </button>
            </div>
            
            <form id="sermon-entry-form" onsubmit="saveSermonNote(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Date</label>
                    <input type="date" id="note-date" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm outline-none focus:border-slate-300 font-medium">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Speaker / Preacher</label>
                    <input type="text" id="note-speaker" placeholder="Pastor or Speaker Name..." required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm outline-none focus:border-slate-300 font-medium">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Sermon Title or Core Topic</label>
                    <input type="text" id="note-topic" placeholder="The Title of Today's Message..." required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm outline-none focus:border-slate-300 font-bold text-slate-900">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Expository Notes & Revelations</label>
                    <textarea id="note-content" rows="4" placeholder="Write down structural notes, key verses, and personal reflections here..." required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm outline-none focus:border-slate-300 font-medium leading-relaxed"></textarea>
                </div>
                <button type="submit" class="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-2.5 rounded-xl text-xs transition uppercase tracking-wider">
                    💾 Commit Entry to Local Storage Vault
                </button>
            </form>
        </div>
    </div>

    <script>
        // 🚀 REAL DATA PROCESSING ENGINE
        window.onload = function() {
            // 📅 DYNAMICALLY SET THE LIVE BANNER TO TODAY'S SYSTEM CLOCK
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('live-banner-date').innerText = new Date().toLocaleDateString('en-US', options);

            // Initialize input field date settings defaults
            document.getElementById('note-date').value = new Date().toISOString().split('T')[0];
            
            // Execute data processing routines
            calculateCurrentCalendarWeek();
            populateWeekSelectorDropdown();
            renderHabitsTrackerDisplay();
            renderNotesArchiveList();
            renderRelationalCareList();
            renderThematicMatrix();
        };

        // DRAWER VISIBILITY MANAGEMENT CONTROL LOOP
        function toggleSermonDrawer() {
            const drawer = document.getElementById('sermon-drawer');
            const backdrop = document.getElementById('sermon-drawer-backdrop');
            
            if (drawer.classList.contains('translate-y-full')) {
                backdrop.classList.remove('hidden');
                setTimeout(() => backdrop.classList.remove('opacity-0'), 10);
                drawer.classList.remove('translate-y-full');
            } else {
                backdrop.classList.add('opacity-0');
                drawer.classList.add('translate-y-full');
                setTimeout(() => backdrop.classList.add('hidden'), 300);
            }
        }

        function calculateCurrentCalendarWeek() {
            populateWeekSelectorDropdown();
        }

        function populateWeekSelectorDropdown() {
            const selector = document.getElementById('week-selector');
            if(!selector) return;
            selector.innerHTML = `<option value="28" selected>Wk 28 - Discipleship Cost</option>`;
        }

        // RENDER HABITS AND HIGHLIGHT TODAY
        function renderHabitsTrackerDisplay() {
            const container = document.getElementById('habit-tracker-container');
            if(!container) return;
            
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            const state = JSON.parse(localStorage.getItem("scribe_habit_state") || "{}");
            
            // Get today's 3-letter abbreviation (e.g., "Sun")
            const todayIndex = new Date().getDay(); // 0 is Sunday, 1 is Monday...
            const daysMap = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const todayAbbr = daysMap[todayIndex];

            container.innerHTML = days.map((day) => {
                const checked = state[day] ? 'checked' : '';
                // If this box matches today, apply special border and background colors
                const isToday = (day === todayAbbr) 
                    ? 'bg-emerald-50/80 border-emerald-300 ring-2 ring-emerald-600/10' 
                    : 'bg-slate-50 border-slate-100';
                const todayTextClass = (day === todayAbbr) ? 'text-emerald-700 font-extrabold' : 'text-slate-400 font-bold';

                return `
                    <div class="flex flex-col items-center p-2 rounded-xl border transition-all ${isToday}">
                        <span class="text-[10px] uppercase mb-1 ${todayTextClass}">${day}</span>
                        <input type="checkbox" ${checked} onclick="toggleHabit('${day}')" class="w-5 h-5 accent-emerald-600 rounded border-slate-300">
                    </div>
                `;
            }).join('');
        }

        function toggleHabit(day) {
            const state = JSON.parse(localStorage.getItem("scribe_habit_state") || "{}");
            state[day] = !state[day];
            localStorage.setItem("scribe_habit_state", JSON.stringify(state));
            renderHabitsTrackerDisplay();
        }

        function renderThematicMatrix() {
            const list = document.getElementById('thematic-matrix-list');
            if(!list) return;
            const progress = JSON.parse(localStorage.getItem("scribe_matrix_progress") || "{}");
            const checked = progress['discipleship_cost_1'] ? 'checked' : '';
            
            list.innerHTML = `
                <div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100">
                    <div class="flex flex-col">
                        <span class="text-[10px] font-bold text-slate-400 uppercase">MON • Take Up Cross</span>
                        <span class="text-xs font-bold text-slate-800">Matthew 16:24-26 ↗</span>
                    </div>
                    <input type="checkbox" ${checked} onclick="toggleMatrix('discipleship_cost_1')" class="w-5 h-5 accent-emerald-600 rounded">
                </div>
            `;
        }

        function toggleMatrix(id) {
            const progress = JSON.parse(localStorage.getItem("scribe_matrix_progress") || "{}");
            progress[id] = !progress[id];
            localStorage.setItem("scribe_matrix_progress", JSON.stringify(progress));
            renderThematicMatrix();
        }

        function renderRelationalCareList() {
            const list = document.getElementById('relational-care-list');
            if(!list) return;
            const prayers = JSON.parse(localStorage.getItem("scribe_care_vault") || "[]");
            
            if(prayers.length === 0) {
                list.innerHTML = `<p class="text-xs text-slate-400 text-center py-2 italic">No active requests logged in cache.</p>`;
                return;
            }

            list.innerHTML = prayers.map(p => `
                <div class="p-3 bg-slate-50 rounded-xl border border-slate-100">
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-xs font-bold text-slate-900">${p.name}</span>
                        <span class="text-[10px] font-bold uppercase bg-emerald-50 text-emerald-700 px-1.5 py-0.5 rounded">${p.season}</span>
                    </div>
                    <p class="text-xs text-slate-600 leading-relaxed font-medium">${p.request}</p>
                </div>
            `).join('');
        }

        function renderNotesArchiveList() {
            const target = document.getElementById('notes-archive-target');
            if(!target) return;
            const sermons = JSON.parse(localStorage.getItem("scribe_sermon_vault") || "[]");
            
            if(sermons.length === 0) {
                target.innerHTML = `<p class="text-xs text-slate-400 text-center py-2 italic">No sermon logs found on this device memory.</p>`;
                return;
            }

            target.innerHTML = sermons.map(s => `
                <div class="p-4 bg-slate-50 rounded-xl border border-slate-100 space-y-1">
                    <div class="flex items-center justify-between text-[10px] font-bold text-slate-400">
                        <span>${s.date}</span>
                        <span class="text-slate-600">${s.speaker}</span>
                    </div>
                    <h4 class="text-xs font-black text-slate-900">${s.topic}</h4>
                    <p class="text-xs text-slate-600 leading-relaxed whitespace-pre-wrap pt-1">${s.content}</p>
                </div>
            `).join('');
        }

        function handleWeekChange() {}
        
        function saveSermonNote(e) {
            e.preventDefault();
            const date = document.getElementById('note-date').value;
            const speaker = document.getElementById('note-speaker').value;
            const topic = document.getElementById('note-topic').value;
            const content = document.getElementById('note-content').value;

            const sermons = JSON.parse(localStorage.getItem("scribe_sermon_vault") || "[]");
            sermons.unshift({ id: Date.now().toString(), date, speaker, topic, content });
            localStorage.setItem("scribe_sermon_vault", JSON.stringify(sermons));

            document.getElementById('sermon-entry-form').reset();
            document.getElementById('note-date').value = new Date().toISOString().split('T')[0];
            
            renderNotesArchiveList();
            toggleSermonDrawer();
        }

        function resetAppData() {
            if(confirm("Are you sure you want to clear your local database cache? This will reset all your prayers and notes data permanently.")) {
                localStorage.clear();
                window.location.reload();
            }
        }
    </script>
</body>
</html>
