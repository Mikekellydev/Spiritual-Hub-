<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiritual Growth Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#fdfbf7] text-[#2c2a29] font-sans min-h-screen antialiased">

    <!-- Privacy Banner -->
    <div class="sticky top-0 z-40 bg-[#fdfbf7]/90 backdrop-blur-md border-b border-[#ebd9c5] max-w-md mx-auto px-5 py-3 flex items-center justify-between">
        <span class="text-xs font-bold tracking-[0.15em] text-[#8c7863] uppercase">Spiritual Growth Hub</span>
        <span class="bg-[#e9f2eb] text-[#3d6346] text-[10px] font-mono px-2 py-0.5 rounded-full font-bold">🔒 Local Vault Only</span>
    </div>

    <div class="max-w-md mx-auto p-5 space-y-6 pb-12">
        
        <!-- 📊 ACTIVE ROLLING WINDOW TRACKER -->
        <header class="bg-[#f5efe6] rounded-2xl p-5 border border-[#ebd9c5] space-y-4">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-lg font-serif font-bold text-[#1c1b1a]">Active Rhythms</h1>
                    <p class="text-[11px] text-[#8c7863]">True rolling 7-day calculation average.</p>
                </div>
                <span class="bg-[#ebd9c5] text-[#54504d] text-[11px] font-bold px-2 py-1 rounded-lg" id="rolling-pct">0%</span>
            </div>
            
            <!-- Minimal day bubble indicators -->
            <div class="grid grid-cols-7 gap-1.5 pt-1 text-center text-[10px] font-bold text-[#8c7863]" id="days-row">
                <!-- Populated dynamically via JavaScript -->
            </div>

            <!-- Summary Blocks (Restored) -->
            <div class="grid grid-cols-2 gap-3 pt-2 border-t border-[#ebd9c5]/60">
                <div class="bg-[#fdfbf7]/80 border border-[#ebd9c5] p-3 rounded-xl text-center">
                    <span class="block text-xl font-serif font-bold text-[#3d6346]" id="metric-streak">0%</span>
                    <span class="text-[9px] font-bold text-[#8c7863] uppercase tracking-wider">Word & Prayer</span>
                </div>
                <div class="bg-[#fdfbf7]/80 border border-[#ebd9c5] p-3 rounded-xl text-center">
                    <span class="block text-xl font-serif font-bold text-[#74583d]" id="metric-care">0 Days</span>
                    <span class="text-[9px] font-bold text-[#8c7863] uppercase tracking-wider">Active Timeline</span>
                </div>
            </div>
        </header>

        <!-- 🎯 ACTIVE WORKSPACE PANEL -->
        <main class="bg-white border border-[#ebd9c5] rounded-2xl p-5 space-y-4 shadow-sm">
            <div class="flex justify-between items-center border-b border-[#f5efe6] pb-3">
                <div>
                    <h2 class="text-sm font-serif font-bold text-[#1c1b1a]" id="active-date-label">Today's Discipline</h2>
                    <p class="text-[11px] text-amber-800 font-medium hidden" id="edit-indicator">⚠️ Modifying historical entry</p>
                </div>
                <button onclick="cancelCurrentDay()" class="text-[11px] font-bold text-rose-700 bg-rose-50 hover:bg-rose-100 border border-rose-100 px-2 py-1 rounded-md transition">
                    🚫 Cancel Day
                </button>
            </div>

            <!-- Inputs -->
            <div class="space-y-3">
                <label class="flex items-center gap-3 text-sm font-medium cursor-pointer py-1">
                    <input type="checkbox" id="field-bible" class="w-4 h-4 rounded text-[#3d6346] focus:ring-[#3d6346] border-[#ebd9c5]">
                    <span>Scripture Tracking Completed</span>
                </label>

                <div class="flex items-center justify-between py-1">
                    <span class="text-sm font-medium">Contemplative Prayer</span>
                    <select id="field-prayer" class="bg-[#fdfbf7] border border-[#ebd9c5] text-xs rounded-lg p-1.5 focus:outline-none">
                        <option value="0">0 mins</option>
                        <option value="15">15 mins</option>
                        <option value="30">30 mins</option>
                        <option value="60">60 mins</option>
                    </select>
                </div>
            </div>

            <!-- Action Triggers -->
            <div class="flex gap-2 pt-2">
                <button onclick="commitActiveEntry()" class="flex-1 bg-[#3d6346] text-white font-bold py-2.5 rounded-xl text-xs hover:bg-[#325239] transition">
                    Save Internal Log
                </button>
                <button onclick="resetWorkspaceToToday()" class="bg-[#f5efe6] text-[#54504d] font-bold px-3 py-2.5 rounded-xl text-xs hover:bg-[#ebd9c5] transition">
                    Clear / Reset
                </button>
            </div>
        </main>

        <!-- ⏳ HISTORICAL LOG DIRECTORY (EDIT SOURCE) -->
        <section class="space-y-3">
            <h3 class="text-xs font-bold uppercase text-[#8c7863] tracking-widest pl-1">Past Logs (Select to Edit)</h3>
            <div class="space-y-2 max-h-48 overflow-y-auto pr-1" id="history-container">
                <!-- Rendered dynamically -->
            </div>
        </section>

    </div>

    <!-- 🧠 CORE FRONTEND LOGIC LAYER -->
    <script>
        // CLEARED OUT: Started database completely empty for clean history records
        let localDatabase = [];

        // Format Utilities
        const getFormattedDate = (d) => d.toISOString().split('T')[0];
        let selectedTargetDate = getFormattedDate(new Date());

        // Lifecycle Initialize
        window.onload = function() {
            renderDashboard();
        }

        function renderDashboard() {
            updateMetricsWindow();
            renderHistoryList();
            
            // Set dynamic header text
            const todayStr = getFormattedDate(new Date());
            document.getElementById('active-date-label').innerText = 
                selectedTargetDate === todayStr ? "Today's Discipline" : `Entry for ${selectedTargetDate}`;
            document.getElementById('edit-indicator').classList.toggle('hidden', selectedTargetDate === todayStr);
        }

        // Calculate metrics inside a standard 7-day array lookback
        function updateMetricsWindow() {
            const daysRow = document.getElementById('days-row');
            daysRow.innerHTML = '';
            
            let totalPossiblePoints = 14; // 2 points per day over 7 days
            let earnedPoints = 0;
            let currentTrackDate = new Date();

            for (let i = 6; i >= 0; i--) {
                let target = new Date();
                target.setDate(currentTrackDate.getDate() - i);
                let targetStr = getFormattedDate(target);
                
                let match = localDatabase.find(r => r.date === targetStr);
                let textLabel = target.toLocaleDateString('en', { weekday: 'short' }).charAt(0);
                
                let dotColor = "bg-[#ebd9c5]"; // empty state color
                if (match) {
                    if (match.status === 'cancelled') {
                        dotColor = "bg-rose-300 text-rose-900";
                    } else {
                        if (match.bible) earnedPoints += 1;
                        if (parseInt(match.prayer) > 0) earnedPoints += 1;
                        dotColor = (match.bible && parseInt(match.prayer) > 0) ? "bg-[#3d6346] text-white" : "bg-amber-200 text-amber-900";
                    }
                }

                daysRow.innerHTML += `
                    <div class="flex flex-col items-center space-y-1">
                        <span class="w-6 h-6 flex items-center justify-center rounded-full text-[9px] font-bold ${dotColor}">${textLabel}</span>
                        <span class="text-[8px] text-stone-400 font-mono">${targetStr.substring(8)}</span>
                    </div>`;
            }

            // Calculate score summary percentages
            let computedScore = totalPossiblePoints > 0 ? Math.round((earnedPoints / totalPossiblePoints) * 100) : 0;
            
            // Update UI elements dynamically
            document.getElementById('rolling-pct').innerText = `${computedScore}%`;
            document.getElementById('metric-streak').innerText = `${computedScore}%`;
            
            // Count active logs total
            let validLogsCount = localDatabase.filter(r => r.status === 'active').length;
            document.getElementById('metric-care').innerText = `${validLogsCount} ${validLogsCount === 1 ? 'Day' : 'Days'}`;
            
            // Give color weight to the master score indicator card
            const scoreBadge = document.getElementById('rolling-pct');
            if(computedScore > 70) {
                scoreBadge.className = "bg-[#3d6346] text-white text-[11px] font-bold px-2 py-1 rounded-lg";
            } else if(computedScore > 0) {
                scoreBadge.className = "bg-amber-600 text-white text-[11px] font-bold px-2 py-1 rounded-lg";
            } else {
                scoreBadge.className = "bg-[#ebd9c5] text-[#54504d] text-[11px] font-bold px-2 py-1 rounded-lg";
            }
        }

        // Render past days available for inline editing selection
        function renderHistoryList() {
            const container = document.getElementById('history-container');
            container.innerHTML = '';

            // Sort by fresh entries first
            let sortedLogs = [...localDatabase].sort((a,b) => b.date.localeCompare(a.date));
            
            if(sortedLogs.length === 0) {
                container.innerHTML = `<p class="text-xs italic text-[#8c7863] text-center py-4">No local entries logged on this session yet.</p>`;
                return;
            }

            sortedLogs.forEach(entry => {
                let textSummary = entry.status === 'cancelled' 
                    ? `<span class="text-rose-700 font-medium font-mono">⚠️ Explicitly Cancelled</span>`
                    : `📖 Bible: ${entry.bible ? '✓' : '✗'} | ⏱️ Prayer: ${entry.prayer}m`;

                container.innerHTML += `
                    <div onclick="selectEntryToEdit('${entry.date}')" class="bg-white hover:bg-[#f5efe6] border border-[#ebd9c5] p-3 rounded-xl flex justify-between items-center text-xs cursor-pointer transition shadow-sm">
                        <span class="font-bold text-[#54504d] font-mono">${entry.date}</span>
                        <div class="text-right text-[11px] text-[#8c7863]">${textSummary}</div>
                    </div>`;
            });
        }

        // Action Drivers
        function selectEntryToEdit(dateString) {
            selectedTargetDate = dateString;
            let match = localDatabase.find(r => r.date === dateString);
            if(match) {
                document.getElementById('field-bible').checked = match.bible;
                document.getElementById('field-prayer').value = match.prayer;
            }
            renderDashboard();
        }

        function commitActiveEntry() {
            let bibleVal = document.getElementById('field-bible').checked;
            let prayerVal = document.getElementById('field-prayer').value;
            
            // Remove matching element if it already exists to overwrite cleanly
            localDatabase = localDatabase.filter(r => r.date !== selectedTargetDate);
            
            localDatabase.push({
                date: selectedTargetDate,
                bible: bibleVal,
                prayer: prayerVal,
                status: "active"
            });

            resetWorkspaceToToday();
        }

        function cancelCurrentDay() {
            localDatabase = localDatabase.filter(r => r.date !== selectedTargetDate);
            localDatabase.push({
                date: selectedTargetDate,
                bible: false,
                prayer: "0",
                status: "cancelled"
            });
            resetWorkspaceToToday();
        }

        function resetWorkspaceToToday() {
            selectedTargetDate = getFormattedDate(new Date());
            document.getElementById('field-bible').checked = false;
            document.getElementById('field-prayer').value = "0";
            renderDashboard();
        }
    </script>
</body>
</html>
